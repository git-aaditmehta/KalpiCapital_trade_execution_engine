version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kalpi-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - WEBHOOK_URL=http://backend:8000/webhook/mock
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kalpi-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
